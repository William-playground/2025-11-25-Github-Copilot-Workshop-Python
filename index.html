<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ポモドーロタイマー</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="timer-container">
        <div class="timer-header">
            <span class="title">ポモドーロタイマー</span>
            <div class="window-controls">
                <span>−</span>
                <span>□</span>
                <span>×</span>
            </div>
        </div>
        
        <div class="timer-body">
            <div class="status-label">作業中</div>
            
            <div class="timer-circle-container">
                <svg class="timer-svg" viewBox="0 0 200 200">
                    <circle class="timer-bg" cx="100" cy="100" r="90"></circle>
                    <circle class="timer-progress" cx="100" cy="100" r="90"></circle>
                </svg>
                <div class="timer-display">
                    <span id="minutes">25</span>:<span id="seconds">00</span>
                </div>
            </div>
            
            <div class="timer-controls">
                <button id="startBtn" class="btn btn-start">開始</button>
                <button id="resetBtn" class="btn btn-reset">リセット</button>
            </div>
        </div>
        
        <div class="timer-footer">
            <div class="progress-title">今日の進捗</div>
            <div class="progress-stats">
                <div class="stat">
                    <span id="completedCount" class="stat-value">0</span>
                    <span class="stat-label">完了</span>
                </div>
                <div class="stat">
                    <span id="totalTime" class="stat-value">0分</span>
                    <span class="stat-label">集中時間</span>
                </div>
            </div>
        </div>
    </div>
    
    <script src="timer.js"></script>
</body>
</html>
